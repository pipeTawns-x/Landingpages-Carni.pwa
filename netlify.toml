[build]
  command = "npm run build"
  publish = "dist"
  functions = "functions"
  edge_functions = "edge-functions"

[build.environment]
  NODE_VERSION = "20.19.0"
  NPM_VERSION = "9.6.7"
  CI = "true"
  VITE_APP_VERSION = "1.0.0"

[context.production.environment]
  VITE_SUPABASE_URL = "https://your-project-ref.supabase.co"
  VITE_SUPABASE_KEY = "your-anon-key"
  VITE_WEATHER_API_KEY = "your-openweathermap-api-key"
  VITE_VAPID_PUBLIC_KEY = "your-vapid-public-key"
  VITE_BASE_URL = "https://your-site-url.netlify.app"

[context.deploy-preview.environment]
  VITE_SUPABASE_URL = "https://your-project-ref.supabase.co"
  VITE_SUPABASE_KEY = "your-anon-key"
  VITE_WEATHER_API_KEY = "your-openweathermap-api-key"
  VITE_VAPID_PUBLIC_KEY = "your-vapid-public-key"
  VITE_BASE_URL = "$DEPLOY_PRIME_URL"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=()"
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://unpkg.com;
      style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com;
      img-src 'self' data: https://api.qrserver.com https://maps.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      connect-src 'self' https://your-project-ref.supabase.co https://api.openweathermap.org;
      frame-src 'self' https://www.google.com;
      worker-src 'self' blob:;
      manifest-src 'self';
    """

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[dev]
  framework = "#custom"
  command = "npm run dev"
  port = 3002
  target_port = 3002
  auto_launch = true
